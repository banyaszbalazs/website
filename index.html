<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visszaszámláló</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#04020a;
  font-family:'Outfit',sans-serif;
  color:#fff;
  overflow:hidden;
}

.bg-glow{
  position:absolute;
  width:80vw;
  height:80vw;
  max-width:800px;
  max-height:800px;
  background:radial-gradient(circle, rgba(155,31,232,.35), transparent 70%);
  filter:blur(90px);
  animation:pulse 6s infinite;
}

.noise{
  position:absolute;
  inset:0;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:.08;
}

.scanlines{
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
  opacity:.25;
}

.flash{
  position:absolute;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
}

@keyframes pulse{
  0%,100%{opacity:.3;transform:scale(1)}
  50%{opacity:.7;transform:scale(1.3)}
}

.container{
  position:relative;
  text-align:center;
  z-index:2;
  padding:1rem;
}

h1{
  font-family:'Rajdhani',sans-serif;
  font-size:clamp(1.8rem,6vw,2.8rem);
  margin-bottom:1rem;
  letter-spacing:.1em;
}

.glitch{
  position:relative;
  color:#bf45ff;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
}

.glitch::before{
  color:#ff004c;
  transform:translate(-3px,0);
  animation:glitchTop .2s infinite;
}

.glitch::after{
  color:#00fff9;
  transform:translate(3px,0);
  animation:glitchBottom .2s infinite;
}

@keyframes glitchTop{
  0%{clip-path:inset(0 0 80% 0)}
  50%{clip-path:inset(0 0 20% 0)}
  100%{clip-path:inset(0 0 80% 0)}
}

@keyframes glitchBottom{
  0%{clip-path:inset(80% 0 0 0)}
  50%{clip-path:inset(20% 0 0 0)}
  100%{clip-path:inset(80% 0 0 0)}
}

.timer{
  display:flex;
  gap:.7rem;
  justify-content:center;
  flex-wrap:wrap;
}

.box{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(155,31,232,.35);
  border-radius:14px;
  padding:.9rem 1rem;
  min-width:70px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 20px rgba(155,31,232,.25);
}

.num{
  font-size:clamp(1.6rem,5vw,2.2rem);
  font-weight:700;
  font-family:'Rajdhani',sans-serif;
  color:#d26bff;
}

.label{
  font-size:.65rem;
  letter-spacing:.15em;
  opacity:.6;
}

.finished{
  font-size:1.3rem;
  color:#bf45ff;
  margin-top:1rem;
  letter-spacing:.08em;
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="noise"></div>
<div class="scanlines"></div>
<div class="flash" id="flash"></div>

<div class="container">
  <h1 id="mainText">VALAMI NAGY DOLOG KÖZELEG</h1>
  <div class="timer" id="timer">
    <div class="box"><div class="num" id="days">0</div><div class="label">NAP</div></div>
    <div class="box"><div class="num" id="hours">0</div><div class="label">ÓRA</div></div>
    <div class="box"><div class="num" id="minutes">0</div><div class="label">PERC</div></div>
    <div class="box"><div class="num" id="seconds">0</div><div class="label">MP</div></div>
  </div>
  <div id="done" class="finished" style="display:none;"></div>
</div>

<audio id="loopAudio" src="loop.mp4" loop></audio>
<audio id="glitchSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
const target = new Date('2026-04-06T18:00:00').getTime();
let finishedTriggered = false;

const text = document.getElementById('mainText');
const flash = document.getElementById('flash');
const sound = document.getElementById('glitchSound');
const music = document.getElementById('loopAudio');

music.volume = 1.0;

function playMusic(){
    music.play().catch(()=>{
        document.body.addEventListener('click', ()=>music.play(), {once:true});
        document.body.addEventListener('touchstart', ()=>music.play(), {once:true});
    });
}

playMusic();

setInterval(()=>{
  text.classList.add('glitch');
  text.textContent = 'COMEBACK';
  text.setAttribute('data-text','COMEBACK');

  flash.style.opacity = 0.15;
  setTimeout(()=> flash.style.opacity = 0, 120);

  try{ sound.currentTime = 0; sound.play(); }catch(e){}

  setTimeout(()=>{
    text.classList.remove('glitch');
    text.textContent = 'VALAMI NAGY DOLOG KÖZELEG';
    text.setAttribute('data-text','VALAMI NAGY DOLOG KÖZELEG');
  }, 1500);
}, 10000);

function update(){
  const now = new Date().getTime();
  const diff = target - now;

  if(diff <= 0 && !finishedTriggered){
    finishedTriggered = true;

    document.getElementById('timer').style.display='none';

    // ✨ SZÖVEG MEGJELENÍTÉS
    const done = document.getElementById('done');
    done.style.display = 'block';
    done.textContent = 'VALAMI NAGY DOLOG KÖZELEG, HAMAROSAN';

    return;
  }

  if(diff <= 0) return;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById('days').textContent = d;
  document.getElementById('hours').textContent = h;
  document.getElementById('minutes').textContent = m;
  document.getElementById('seconds').textContent = s;
}

setInterval(update,1000);
update();
</script>

</body>
</html>
